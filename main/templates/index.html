{% load static %}
<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід - EduTrack</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'images/favicon.svg' %}">
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>

<body class="font-sans bg-main-gradient flex items-center justify-center min-h-screen p-4 text-bodyText">
    <div class="w-full max-w-md">
        <div class="glass-panel rounded-3xl p-8 md:p-12 text-center relative overflow-hidden" role="main">
            <div class="mb-8 animate-fade-in opacity-0" style="animation-fill-mode: forwards;">
                <div class="flex items-center justify-center gap-3 mb-4">
                    <div class="text-primary">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 14l9-5-9-5-9 5 9 5z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.908V14z" />
                        </svg>
                    </div>
                    <h1 class="text-3xl font-bold text-dark m-0">EduTrack</h1>
                </div>
            </div>

            <h2 class="text-bodyText mb-10 text-base font-medium">Вхід до системи</h2>

            {% if messages %}
            <div class="mb-6 animate-fade-in opacity-0" style="animation-fill-mode: forwards;">
                {% for message in messages %}
                <div class="bg-error/10 text-error text-center text-sm font-medium p-4 rounded-xl mb-4">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form id="loginForm" class="space-y-6" method="POST" action="{% url 'login_process' %}">
                {% csrf_token %}

                <div class="text-left">
                    <label for="username" class="sr-only">Логін (Email)</label>
                    <div class="relative flex items-center animate-slide-up opacity-0"
                        style="animation-fill-mode: forwards;">
                        <svg class="absolute left-4 w-5 h-5 text-bodyText pointer-events-none" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                        <input type="text" id="username" name="username" placeholder="Логін (Email)" required
                            class="w-full py-3.5 pl-11 pr-4 border border-gray-200 rounded-xl bg-gray-50 text-dark text-base transition-all duration-300 focus:outline-none focus:border-primary focus:bg-white focus:ring-4 focus:ring-primary/10"
                            aria-required="true">
                    </div>
                </div>

                <div class="text-left">
                    <label for="password" class="sr-only">Пароль</label>
                    <div class="relative flex items-center animate-slide-up opacity-0 delay-100"
                        style="animation-fill-mode: forwards; animation-delay: 100ms;">
                        <svg class="absolute left-4 w-5 h-5 text-bodyText pointer-events-none" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M14 9a2 2 0 00-2-2H8a2 2 0 00-2 2v2a2 2 0 002 2h4a2 2 0 002-2V9z" />
                        </svg>
                        <input type="password" id="password" name="password" placeholder="Пароль" required
                            class="w-full py-3.5 pl-11 pr-12 border border-gray-200 rounded-xl bg-gray-50 text-dark text-base transition-all duration-300 focus:outline-none focus:border-primary focus:bg-white focus:ring-4 focus:ring-primary/10"
                            aria-required="true">
                        <button type="button" onclick="togglePasswordVisibility()"
                            class="absolute right-4 text-bodyText hover:text-primary transition-colors"
                            aria-label="Показати/приховати пароль">
                            <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn bg-primary w-full mt-2 animate-slide-up opacity-0 delay-200"
                    style="animation-fill-mode: forwards; animation-delay: 200ms;">УВІЙТИ</button>
            </form>
        </div>
    </div>

<script>
    function togglePasswordVisibility() {
        const input = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.innerHTML = `
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />`;
        } else {
            input.type = 'password';
            icon.innerHTML = `
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />`;
        }
    }
</script>
</body>

</html>
